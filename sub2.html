<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>감성미식 - 관광행동 선택</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="dist/css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-to-content">본문 바로가기</a>

    <!-- 모바일 및 PC 공용 사이드바 (드로워 메뉴) -->
    <div class="site-drawer__backdrop" aria-hidden="true"></div>
    <aside id="site-drawer" class="site-drawer" role="dialog" aria-modal="true" aria-hidden="true" aria-label="전체 메뉴">
      <div class="site-drawer__header">
        <div class="site-drawer__brand">
          <img src="/src/image/logo2.png" alt="감성미식 로고" class="site-drawer__logo-img" />
        </div>
        <button type="button" class="site-drawer__close" aria-label="메뉴 닫기">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="site-drawer__body">
        <!-- + 새 대화 버튼 -->
        <a href="" type="button" class="site-drawer__new-chat-btn"> <span class="site-drawer__plus-icon" aria-hidden="true">+</span> 새 대화 </a>

        <!-- 최근 세션 섹션 -->
        <div class="site-drawer__section">
          <h3 class="site-drawer__section-title">최근 세션</h3>
          <ul class="site-drawer__session-list">
            <li class="site-drawer__session-item">
              <div class="site-drawer__session-card">
                <div class="site-drawer__session-info">
                  <h4 class="site-drawer__session-name">혼밥 · 애월 점심</h4>
                  <p class="site-drawer__session-desc">현지 감성 탐험가형 <span>"얼큰한 국물" → 추천 5곳</span></p>
                  <span class="site-drawer__session-time">3시간 전</span>
                </div>
                <button type="button" class="site-drawer__session-delete" aria-label="세션 삭제">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M7 21C6.45 21 5.97917 20.8042 5.5875 20.4125C5.19583 20.0208 5 19.55 5 19V6H4V4H9V3H15V4H20V6H19V19C19 19.55 18.8042 20.0208 18.4125 20.4125C18.0208 20.8042 17.55 21 17 21H7ZM17 6H7V19H17V6ZM9 17H11V8H9V17ZM13 17H15V8H13V17Z"
                      fill="#5A928B"
                    />
                  </svg>
                </button>
              </div>
            </li>
            <li class="site-drawer__session-item">
              <div class="site-drawer__session-card">
                <div class="site-drawer__session-info">
                  <h4 class="site-drawer__session-name">동행 · 제주시 저녁</h4>
                  <p class="site-drawer__session-desc">미식 탐험가형 <span>"회/해산물" → 추천 4곳</span></p>
                  <span class="site-drawer__session-time">3시간 전</span>
                </div>
                <button type="button" class="site-drawer__session-delete" aria-label="세션 삭제">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M7 21C6.45 21 5.97917 20.8042 5.5875 20.4125C5.19583 20.0208 5 19.55 5 19V6H4V4H9V3H15V4H20V6H19V19C19 19.55 18.8042 20.0208 18.4125 20.4125C18.0208 20.8042 17.55 21 17 21H7ZM17 6H7V19H17V6ZM9 17H11V8H9V17ZM13 17H15V8H13V17Z"
                      fill="#5A928B"
                    />
                  </svg>
                </button>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <div class="site-drawer__footer">
        <div class="site-drawer__user-actions">
          <!-- 마이페이지 링크 -->
          <a href="#" class="site-drawer__user-link">
            <button type="button" class="site-drawer__session-user" aria-label="마이페이지">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="19" viewBox="0 0 20 19" fill="none">
                <path
                  d="M6.90908 7.25794C6.0808 6.42966 5.66667 5.42701 5.66667 4.25C5.66667 3.07322 6.0808 2.0707 6.90908 1.24242C7.73712 0.41414 8.73965 0 9.91667 0C11.0937 0 12.0962 0.41414 12.9242 1.24242C13.7525 2.0707 14.1667 3.07322 14.1667 4.25C14.1667 5.42701 13.7525 6.42966 12.9242 7.25794C12.0962 8.08598 11.0937 8.5 9.91667 8.5C8.73965 8.5 7.73712 8.08598 6.90908 7.25794ZM0 18.7439V16.4117C0 15.8269 0.170236 15.2797 0.510708 14.7702C0.851417 14.2609 1.30959 13.8654 1.88523 13.5837C3.22209 12.9427 4.55978 12.4618 5.89829 12.1412C7.23681 11.8208 8.57626 11.6606 9.91667 11.6606C11.2571 11.6606 12.5965 11.8208 13.935 12.1412C15.2736 12.4618 16.6112 12.9427 17.9481 13.5837C18.5237 13.8654 18.9819 14.2609 19.3226 14.7702C19.6631 15.2797 19.8333 15.8269 19.8333 16.4117V18.7439H0Z"
                  fill="#333333"
                />
              </svg>
            </button>
            <span class="site-drawer__user-text">마이페이지</span>
          </a>

          <!-- 언어 선택 영역 -->
          <div class="site-drawer__lang-select">
            <button type="button" class="site-drawer__lang-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="언어 선택 (현재 한국어)" aria-controls="site-drawer-lang-list">
              <span class="site-drawer__lang-text">한국어</span>
              <svg
                class="site-drawer__lang-arrow"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <ul id="site-drawer-lang-list" class="site-drawer__lang-list" role="listbox" aria-label="언어 선택 리스트" hidden>
              <li role="option" aria-selected="true" class="site-drawer__lang-item site-drawer__lang-item--selected" data-value="ko" tabindex="0">한국어</li>
              <li role="option" aria-selected="false" class="site-drawer__lang-item" data-value="en" tabindex="0">영어</li>
              <li role="option" aria-selected="false" class="site-drawer__lang-item" data-value="ja" tabindex="0">일본어</li>
            </ul>
          </div>
        </div>
      </div>
    </aside>

    <!-- 상단 헤더 영역 -->
    <header id="header" class="site-header site-header--quick-select">
      <div class="container site-header__inner">
        <a href="main.html" class="btn btn--text site-header__back" aria-label="이전 페이지(홈)로 이동">
          <!-- 뒤로가기 화살표 < -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>

        <!-- 헤더 중앙 타이틀 노출하지 않음 (Figma 기준) -->
        <div class="site-header__center site-header__title-text"></div>

        <nav id="gnb-menu" class="site-header__nav" aria-label="주 메뉴" hidden>
          <ul class="site-header__menu">
            <li><a href="main.html">홈</a></li>
            <li><a href="detail.html">맛집 탐색(지도)</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- 전면 반응형 관광행동 퀵 선택 영역 -->
    <main id="main">
      <div class="quick-select-container">
        <div class="quick-select-panel">
          <!-- 1. 감성미식 로고 -->
          <div class="quick-select-logo">
            <img src="/src/image/logo.png" alt="감성미식 로고" class="quick-select-logo__img" />
          </div>

          <!-- 2. 중앙 타이틀 -->
          <h2 id="diagnosis-title" class="quick-select-title">먼저, 지금 상황을 알려주세요</h2>

          <!-- 3. 진단 폼 -->
          <form class="quick-select-form" action="main.html" method="GET" id="diagnosisForm">
            <!-- 카드 패널 -->
            <div class="quick-select-card">
              <!-- 3-1. 식사형태 -->
              <div class="quick-select-row">
                <span class="quick-select-row__label" id="meal-type-label">식사형태</span>
                <div class="quick-select-row__chips chip-group" role="radiogroup" aria-labelledby="meal-type-label">
                  <input type="radio" name="meal_type" id="meal-alone" value="혼밥" class="chip-radio" checked />
                  <label for="meal-alone" class="chip-label">혼밥</label>

                  <input type="radio" name="meal_type" id="meal-drink" value="혼술" class="chip-radio" />
                  <label for="meal-drink" class="chip-label">혼술</label>

                  <input type="radio" name="meal_type" id="meal-together" value="함께식사" class="chip-radio" />
                  <label for="meal-together" class="chip-label">함께식사</label>

                  <input type="radio" name="meal_type" id="meal-party" value="함께 술자리" class="chip-radio" />
                  <label for="meal-party" class="chip-label">함께 술자리</label>
                </div>
              </div>

              <!-- 3-2. 동행유형 -->
              <div class="quick-select-row">
                <span class="quick-select-row__label" id="companion-type-label">동행유형</span>
                <div class="quick-select-row__chips chip-group" role="radiogroup" aria-labelledby="companion-type-label">
                  <input type="radio" name="companion_type" id="companion-alone" value="혼자" class="chip-radio" checked />
                  <label for="companion-alone" class="chip-label">혼자</label>

                  <input type="radio" name="companion_type" id="companion-couple" value="연인/부부" class="chip-radio" />
                  <label for="companion-couple" class="chip-label">연인/부부</label>

                  <input type="radio" name="companion_type" id="companion-friend" value="친구" class="chip-radio" />
                  <label for="companion-friend" class="chip-label">친구</label>

                  <input type="radio" name="companion_type" id="companion-child" value="가족(아이)" class="chip-radio" />
                  <label for="companion-child" class="chip-label">가족(아이)</label>

                  <input type="radio" name="companion_type" id="companion-parents" value="가족(부모님)" class="chip-radio" />
                  <label for="companion-parents" class="chip-label">가족(부모님)</label>

                  <input type="radio" name="companion_type" id="companion-group" value="단체" class="chip-radio" />
                  <label for="companion-group" class="chip-label">단체</label>
                </div>
              </div>

              <!-- 3-3. 시간대 -->
              <div class="quick-select-row">
                <span class="quick-select-row__label" id="time-slot-label">시간대</span>
                <div class="quick-select-row__chips chip-group" role="radiogroup" aria-labelledby="time-slot-label">
                  <input type="radio" name="time_slot" id="time-morning" value="아침" class="chip-radio" checked />
                  <label for="time-morning" class="chip-label">아침</label>

                  <input type="radio" name="time_slot" id="time-lunch" value="점심" class="chip-radio" />
                  <label for="time-lunch" class="chip-label">점심</label>

                  <input type="radio" name="time_slot" id="time-dinner" value="저녁" class="chip-radio" />
                  <label for="time-dinner" class="chip-label">저녁</label>

                  <input type="radio" name="time_slot" id="time-night" value="야식" class="chip-radio" />
                  <label for="time-night" class="chip-label">야식</label>

                  <input type="radio" name="time_slot" id="time-cafe" value="카페/디저트" class="chip-radio" />
                  <label for="time-cafe" class="chip-label">카페/디저트</label>
                </div>
              </div>
            </div>

            <!-- 4. 추천 실행 버튼 -->
            <div class="quick-select-actions">
              <button type="submit" class="btn btn--primary quick-select-submit">AI 추천 받기</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="src/js/modal.js"></script>
    <script src="src/js/tab.js"></script>
    <script src="src/js/common.js?v=7"></script>
  </body>
</html>
